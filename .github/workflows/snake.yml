name: generate snake

on:
  schedule:
    - cron: "0 */12 * * *"   # refresh twice a day
  workflow_dispatch:          # let me run it on demand
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate emerald contribution snake
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake-dark.svg?palette=github-dark&color_snake=%2300ff41&color_dots=%23000000,%23003311,%23006622,%2300cc33,%2300ff41
            dist/snake.svg?palette=github-dark&color_snake=%2300ff41&color_dots=%23000000,%23003311,%23006622,%2300cc33,%2300ff41

      - name: Push to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
